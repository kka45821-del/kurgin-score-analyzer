name: KURGIN Score Analyzer CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  core-api-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: "."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-api.txt ]; then pip install -r requirements-api.txt; else pip install -r requirements.txt; fi
          pip install pytest

      - name: Compile Python without writing pyc
        run: |
          python scripts/ci_compile.py

      - name: Core SDK smoke test
        run: |
          python scripts/smoke_test_core.py

      - name: API contract test
        run: |
          python scripts/contract_test_api.py

      - name: Platform card smoke test
        run: |
          python scripts/smoke_test_platform_card.py

      - name: Cloud formula client contract tests
        run: |
          python scripts/contract_test_formula_client.py

      - name: Analyzer output schema lock test
        run: |
          python scripts/contract_test_output_schema.py

      - name: Formula regression smoke test
        run: |
          mkdir -p output
          python -m formula_comparison.regression_runner \
            --input golden_dataset/golden_dataset_template.csv \
            --output output/ci_regression_report.csv \
            --summary output/ci_regression_summary.csv \
            --versions current experimental_v2_candidate
          rm -rf output

      - name: Repository hygiene
        run: |
          python scripts/ci_repo_hygiene.py
